<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision Cheats — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/theme-vision-x.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--vx-bg);
      color: var(--vx-text);
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
    }

    #bubble-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 50% 20%, rgba(160, 32, 240, 0.22), transparent 55%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(191, 64, 255, 0.12), transparent 50%),
        #000;
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(440px, calc(100vw - 28px));
      padding: 28px 32px 26px;
      background: var(--vx-bg-elevated);
      border: 1px solid var(--vx-border);
      border-radius: 18px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 40px rgba(160, 32, 240, 0.15),
        0 24px 80px rgba(0, 0, 0, 0.65),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .brand {
      text-align: center;
      margin-bottom: 26px;
    }

    .brand-logo {
      width: min(320px, 92%);
      height: auto;
      margin: 0 auto 12px;
      display: block;
      filter: drop-shadow(0 0 28px rgba(191, 64, 255, 0.35));
    }

    .brand-title {
      font-family: var(--font-brand);
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--vx-silver-bright) 0%, var(--vx-purple-bright) 55%, var(--vx-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-sub {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-family: var(--font-brand);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.45em;
      color: var(--vx-purple-bright);
      text-transform: uppercase;
    }

    .brand-sub::before,
    .brand-sub::after {
      content: '';
      height: 1px;
      width: 36px;
      background: linear-gradient(90deg, transparent, var(--vx-purple), transparent);
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--vx-muted);
      margin-bottom: 7px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(160, 32, 240, 0.25);
      border-radius: 11px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--vx-purple-bright);
      box-shadow: 0 0 0 3px var(--vx-purple-dim), 0 0 20px var(--vx-purple-glow);
    }

    .input-wrap svg { flex-shrink: 0; opacity: 0.5; color: var(--vx-purple-bright); }

    .input-wrap input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 13px 0;
      color: var(--vx-text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
    }

    .input-wrap input::placeholder { color: rgba(244, 240, 248, 0.28); }

    .btn-login {
      width: 100%;
      margin-top: 6px;
      padding: 14px;
      border: none;
      border-radius: 11px;
      font-family: var(--font-brand);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--vx-purple-deep) 0%, var(--vx-purple) 45%, var(--vx-purple-bright) 100%);
      box-shadow: 0 8px 32px rgba(160, 32, 240, 0.45);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(191, 64, 255, 0.55);
    }

    .loader {
      display: none;
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      border-radius: 11px;
      background: var(--vx-purple-dim);
      border: 1px solid var(--vx-border);
      color: var(--vx-purple-bright);
      font-size: 0.88rem;
      font-weight: 600;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .loader.show { display: flex; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(160, 32, 240, 0.25);
      border-top-color: var(--vx-purple-bright);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 14px;
      color: var(--vx-muted);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(160, 32, 240, 0.4), transparent);
    }

    .btn-secondary {
      width: 100%;
      padding: 12px;
      border-radius: 11px;
      border: 1px solid var(--vx-border);
      background: transparent;
      color: var(--vx-silver-bright);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-secondary:hover {
      background: var(--vx-purple-dim);
      border-color: var(--vx-purple-bright);
    }

    .message {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      line-height: 1.4;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fda4af;
    }

    .message.show { display: block; }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      font-size: 0.68rem;
      color: rgba(244, 240, 248, 0.32);
      font-family: var(--mono);
      letter-spacing: 0.08em;
    }

    .panel-urls {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(191, 64, 255, 0.22);
      background: rgba(0, 0, 0, 0.35);
      font-family: var(--mono);
      font-size: 0.72rem;
      line-height: 1.55;
      color: rgba(244, 240, 248, 0.72);
    }

    .panel-urls-title {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(191, 64, 255, 0.85);
      margin-bottom: 8px;
    }

    .panel-urls a {
      color: #d8a8ff;
      text-decoration: none;
      word-break: break-all;
    }

    .panel-urls a:hover { text-decoration: underline; }

    .panel-urls .url-row { margin-top: 4px; }
  </style>
</head>
<body>
  <canvas id="bubble-canvas" aria-hidden="true"></canvas>
  <div class="bg-glow" aria-hidden="true"></div>

  <main class="card">
    <div class="brand">
      <img class="brand-logo" src="/static/vision-cheats-logo.png" alt="Vision Cheats" width="300" height="auto">
      <div class="brand-sub">Secure login</div>
    </div>

    <form id="login-form">
      <div class="field">
        <label for="username">Username</label>
        <div class="input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input id="username" type="text" name="Username" placeholder="Enter username" required autocomplete="username">
        </div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="password" type="password" name="Password" placeholder="Enter password" required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn-login" id="login-btn">Sign in</button>
      <div class="loader" id="login-loader"><span class="spinner"></span> Verifying…</div>
    </form>

    <div class="divider">or</div>
    <button type="button" class="btn-secondary" onclick="window.location.href='/register'">Create account</button>

    <div id="login-msg" class="message"></div>
    <div id="panel-urls" class="panel-urls" hidden>
      <div class="panel-urls-title">Panel links (same Wi‑Fi / LAN)</div>
      <div class="url-row">This PC: <a id="url-localhost" href="#">…</a></div>
      <div id="url-lan-list"></div>
    </div>
    <p class="footer-note">VISION X STREAMER · KeyAuth</p>
  </main>

  <script>
    (function initBubbles() {
      const canvas = document.getElementById('bubble-canvas');
      const ctx = canvas.getContext('2d');
      let w, h;
      const bubbles = [];
      const count = 42;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }

      function rand(a, b) { return a + Math.random() * (b - a); }

      for (let i = 0; i < count; i++) {
        const purple = Math.random() > 0.35;
        bubbles.push({
          x: rand(0, 1),
          y: rand(0, 1),
          r: rand(8, 38),
          vx: rand(-0.00035, 0.00035),
          vy: rand(-0.0005, -0.00008),
          purple,
          alpha: rand(0.08, 0.35),
          pulse: rand(0, Math.PI * 2),
        });
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        for (const b of bubbles) {
          b.x += b.vx;
          b.y += b.vy;
          b.pulse += 0.02;
          if (b.x < -0.05) b.x = 1.05;
          if (b.x > 1.05) b.x = -0.05;
          if (b.y < -0.1) b.y = 1.05;

          const px = b.x * w;
          const py = b.y * h;
          const pr = b.r * (1 + Math.sin(b.pulse) * 0.12);
          const g = ctx.createRadialGradient(px, py, 0, px, py, pr);
          if (b.purple) {
            g.addColorStop(0, `rgba(191, 64, 255, ${b.alpha})`);
            g.addColorStop(0.5, `rgba(160, 32, 240, ${b.alpha * 0.4})`);
            g.addColorStop(1, 'rgba(160, 32, 240, 0)');
          } else {
            g.addColorStop(0, `rgba(220, 220, 230, ${b.alpha * 0.5})`);
            g.addColorStop(1, 'rgba(200, 200, 210, 0)');
          }
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(px, py, pr, 0, Math.PI * 2);
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize();
      draw();
    })();

    (async function loadPanelUrls() {
      try {
        const res = await fetch('/api/panel-urls');
        const data = await res.json();
        const box = document.getElementById('panel-urls');
        const local = document.getElementById('url-localhost');
        const lanList = document.getElementById('url-lan-list');
        if (!box || !local || !lanList) return;
        local.href = data.localhost;
        local.textContent = data.localhost;
        lanList.innerHTML = '';
        (data.lan || []).forEach((url) => {
          const row = document.createElement('div');
          row.className = 'url-row';
          row.innerHTML = 'LAN IPv4: <a href="' + url + '">' + url + '</a>';
          lanList.appendChild(row);
        });
        if (!(data.lan || []).length) {
          const row = document.createElement('div');
          row.className = 'url-row';
          row.textContent = 'LAN: connect Wi‑Fi, allow firewall port ' + (data.port || 5004);
          lanList.appendChild(row);
        }
        box.hidden = false;
      } catch (_) {}
    })();

    const form = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const loader = document.getElementById('login-loader');
    const messageBox = document.getElementById('login-msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageBox.classList.remove('show');
      messageBox.innerHTML = '';
      loginBtn.style.display = 'none';
      loader.classList.add('show');

      const data = new URLSearchParams(new FormData(form));

      try {
        const response = await fetch('/', { method: 'POST', body: data });
        if (response.redirected) {
          try { localStorage.setItem('playLoginSuccessSound', '1'); } catch (err) {}
          window.location.href = response.url;
        } else {
          loader.classList.remove('show');
          loginBtn.style.display = 'block';
          messageBox.innerHTML = await response.text();
          messageBox.classList.add('show');
        }
      } catch (err) {
        loader.classList.remove('show');
        loginBtn.style.display = 'block';
        messageBox.textContent = 'Network error. Please try again.';
        messageBox.classList.add('show');
      }
    });
  </script>
</body>
</html>
